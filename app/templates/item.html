<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ item['file_name'] }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main>
      <p><a href="{{ url_for('library') }}">← Back to library</a></p>
      <h1>{{ item['file_name'] }}</h1>
      <p><strong>Section:</strong> {{ item['section'] }}</p>
      <p><strong>Path:</strong> {{ item['path'] }}</p>
      <p>
        <a href="{{ url_for('view_item', item_id=item['id']) }}" target="_blank" rel="noopener">Open in browser</a>
        |
        <a href="{{ url_for('download_item', item_id=item['id']) }}">Download</a>
      </p>
    </main>
  </body>
</html>
